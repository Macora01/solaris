            background: #050510;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        #canvas-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        /* Panel de información */
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 340px;
            max-height: 85vh;
            background: rgba(10, 15, 40, 0.95);
            border: 2px solid #4a90e2;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 0 40px rgba(74, 144, 226, 0.3);
            backdrop-filter: blur(15px);
            z-index: 100;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        #info-panel.hidden {
            opacity: 0;
            transform: translateX(400px);
            pointer-events: none;
        }
        
        .panel-header {
            background: linear-gradient(135deg, #1a2a5a, #2a4a8a);
            padding: 15px 20px;
            border-bottom: 2px solid #4a90e2;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .panel-header h2 {
            font-size: 1.3em;
            color: #fff;
            flex: 1;
        }
        
        .panel-header .planet-icon {
            font-size: 2em;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0 5px;
            transition: color 0.2s;
        }
        
        .close-btn:hover { color: #fff; }
        
        .panel-body {
            padding: 15px 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(74, 144, 226, 0.2);
        }
        
        .info-row:last-child { border-bottom: none; }
        
        .info-label {
            color: #8899bb;
            font-size: 0.9em;
        }
        
        .info-value {
            color: #fff;
            font-weight: 600;
            font-size: 0.9em;
            text-align: right;
            max-width: 65%;
        }
        
        .composition {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid rgba(74, 144, 226, 0.3);
        }
        
        .composition h4 {
            color: #4a90e2;
            margin-bottom: 12px;
            font-size: 1em;
        }
        
        .comp-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
            font-size: 0.85em;
        }
        
        .comp-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            margin-right: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .comp-bar-bg {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 0 10px;
            overflow: hidden;
        }
        
        .comp-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .comp-percent {
            color: #aaa;
            min-width: 40px;
            text-align: right;
        }
        
        .internal-structure {
            margin-top: 15px;
            padding: 12px;
            background: rgba(74, 144, 226, 0.1);
            border-radius: 8px;
            border-left: 3px solid #4a90e2;
        }
        
        .internal-structure h4 {
            color: #4a90e2;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        
        .internal-structure p {
            font-size: 0.85em;
            line-height: 1.5;
            color: #bbb;
        }
        
        /* Controles principales */
        .main-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(10, 15, 40, 0.9);
            padding: 10px 15px;
            border-radius: 50px;
            border: 1px solid rgba(74, 144, 226, 0.4);
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .ctrl-btn {
            background: linear-gradient(135deg, #1a2a5a, #2a4a8a);
            color: #fff;
            border: 1px solid rgba(74, 144, 226, 0.3);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .ctrl-btn:hover {
            background: linear-gradient(135deg, #2a4a8a, #3a5a9a);
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.4);
            transform: translateY(-1px);
        }
        
        .ctrl-btn.active {
            background: linear-gradient(135deg, #4a90e2, #6ab0f3);
            border-color: #6ab0f3;
        }
        
        #speed-display {
            color: #4a90e2;
            font-weight: bold;
            font-size: 0.9em;
            padding: 0 5px;
            min-width: 50px;
            text-align: center;
        }
        
        /* Panel de navegación */
        .nav-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 15, 40, 0.9);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(74, 144, 226, 0.3);
            z-index: 100;
            max-width: 250px;

        .nav-panel h4 {
            color: #4a90e2;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .planet-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.85em;

        .planet-item:hover {
            background: rgba(74, 144, 226, 0.2);
        }
        
        .planet-item.active {
            background: rgba(74, 144, 226, 0.3);
            border: 1px solid rgba(74, 144, 226, 0.5);
        }
        
        .planet-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        /* Instrucciones */

            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(10, 15, 40, 0.85);
            padding: 12px 15px;
            border-radius: 10px;
            border-left: 3px solid #4a90e2;
            font-size: 0.8em;
            max-width: 280px;
            z-index: 100;
        }

            margin: 3px 0;
            color: #aaa;
        }
        
        .instructions strong { color: #4a90e2; }
        
        /* Loading */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2em;
            color: #4a90e2;
            z-index: 200;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #4a90e2; border-radius: 3px; }
        
        /* Tooltip flotante */
        .tooltip {
            position: absolute;
            background: rgba(10, 15, 40, 0.95);
            border: 1px solid #4a90e2;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85em;
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .tooltip.visible {
            opacity: 1;
        }
        
        /* Modo vista */
        .view-mode-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 40, 0.9);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(74, 144, 226, 0.4);
            font-size: 0.85em;
            z-index: 100;
        }

</head>
<body>
    <div id="canvas-container">
        <canvas id="solarCanvas"></canvas>
        <div id="loading">🚁 Cargando sistema solar...</div>
        
        <!-- Panel de información -->
        <div id="info-panel" class="hidden">
            <div class="panel-header">
                <span class="planet-icon" id="panel-icon">🪐</span>
                <h2 id="panel-title">Planeta</h2>
                <button class="close-btn" onclick="closePanel()">×</button>
            </div>
            <div class="panel-body" id="panel-body"></div>
        </div>
        
        <!-- Lista de navegación rápida -->
        <div class="nav-panel">
            <h4>🧭 Navegación Rápida</h4>
            <div class="planet-list" id="planet-list"></div>
        </div>
        
        <!-- Indicador de vista -->
        <div class="view-mode-indicator" id="view-indicator">
            🚁 Vista Cenital - Helicóptero Interestelar
        </div>
        
        <!-- Instrucciones -->
        <div class="instructions">
            <p><strong>🖱️ Click</strong> en cualquier planeta o luna</p>
            <p><strong>🔄 Arrastrar</strong>: Mover vista</p>
            <p><strong>🔍 Rueda</strong>: Zoom</p>
            <p><strong>Espacio</strong>: Pausar/Reanudar</p>
        </div>
        
        <!-- Controles principales -->
        <div class="main-controls">
            <button class="ctrl-btn" id="btn-play" onclick="togglePause()">⏸️ Pausar</button>
            <button class="ctrl-btn" onclick="changeSpeed(-0.5)">🐌</button>
            <span id="speed-display">1.0x</span>
            <button class="ctrl-btn" onclick="changeSpeed(0.5)">🚀</button>
            <button class="ctrl-btn" onclick="resetView()">🔄 Reset</button>
            <button class="ctrl-btn" id="btn-orbits" onclick="toggleOrbits()">🔵 Órbitas</button>
            <button class="ctrl-btn" id="btn-labels" onclick="toggleLabels()">🏷️ Etiquetas</button>
            <button class="ctrl-btn" id="btn-asteroids" onclick="toggleAsteroids()">☄️ Asteroides</button>
            <button class="ctrl-btn" id="btn-perspective" onclick="togglePerspective()">🌐 3D</button>
        </div>
        
        <!-- Tooltip -->
        <div class="tooltip" id="tooltip"></div>
    </div>

    // ==================== ESTADO DE LA APLICACIÓN ====================
    const canvas = document.getElementById('solarCanvas');
    const ctx = canvas.getContext('2d');
    
    let W, H;
    let time = 0;
    let isPaused = false;
    let speed = 1.0;
    let showOrbits = true;
    let showLabels = true;
    let showAsteroids = true;
    let use3D = false;
    
    // Cámara
    let camX = 0, camY = 0;
    let zoom = 1;
    let isDragging = false;
    let dragStartX, dragStartY;
    let dragCamStartX, dragCamStartY;
    
    // Selección
    let hoveredBody = null;
    let selectedBody = null;
    
    // Asteroides (generados una vez)
    let asteroids = [];
    
    // ==================== INICIALIZACIÓN ====================
    function init() {
        resize();
        generateAsteroids();
        buildPlanetList();
        setupEvents();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('btn-orbits').classList.add('active');
        document.getElementById('btn-labels').classList.add('active');
        document.getElementById('btn-asteroids').classList.add('active');
        
        animate();
    }
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    
    function generateAsteroids() {
        asteroids = [];
        for (let i = 0; i < 200; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 270 + Math.random() * 60; // Entre Marte y Júpiter
            asteroids.push({
                angle: angle,
                radius: radius,
                size: 0.5 + Math.random() * 2,
                speed: 0.3 + Math.random() * 0.2,
                brightness: 0.3 + Math.random() * 0.5
            });
        }
    }
    
    function buildPlanetList() {
        const list = document.getElementById('planet-list');
        list.innerHTML = '';
        
        // Sol
        addItem(list, DATA.sun, 'sun');
        
        // Planetas
        DATA.planets.forEach(p => addItem(list, p, 'planet'));
        
        // Planetas enanos
        DATA.dwarfPlanets.forEach(p => addItem(list, p, 'dwarf'));
        
        // Lunas principales
        DATA.moons.slice(0, 5).forEach(m => addItem(list, m, 'moon'));
    }
    
    function addItem(container, body, type) {
        const div = document.createElement('div');
        div.className = 'planet-item';
        div.dataset.name = body.name;
        div.innerHTML = `<div class="planet-dot" style="background:${body.color}"></div><span>${body.emoji} ${body.name}</span>`;
        div.onclick = () => selectBody(body, type);
        container.appendChild(div);
    }
    
    function setupEvents() {
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('mouseup', onMouseUp);
        canvas.addEventListener('mouseleave', onMouseUp);
        canvas.addEventListener('wheel', onWheel, { passive: false });
        canvas.addEventListener('click', onClick);
        
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); togglePause(); }
        });
    }
    
    // ==================== INTERACCIÓN ====================
    function onMouseDown(e) {
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragCamStartX = camX;
        dragCamStartY = camY;
    }
    
    function onMouseMove(e) {
        if (isDragging) {
            camX = dragCamStartX + (e.clientX - dragStartX) / zoom;
            camY = dragCamStartY + (e.clientY - dragStartY) / zoom;
        }
        
        // Detectar hover
        hoveredBody = detectHover(e.clientX, e.clientY);
        canvas.style.cursor = hoveredBody ? 'pointer' : (isDragging ? 'grabbing' : 'grab');
        
        // Tooltip
        showTooltip(e.clientX, e.clientY);
    }
    
    function onMouseUp() {
        isDragging = false;
    }
    
    function onWheel(e) {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        zoom = Math.max(0.2, Math.min(5, zoom * factor));
    }
    
    function onClick(e) {
        if (!isDragging && hoveredBody) {
            selectBody(hoveredBody.body, hoveredBody.type);
        }
    }
    
    function detectHover(mx, my) {
        const cx = W / 2 + camX * zoom;
        const cy = H / 2 + camY * zoom;
        
        // Verificar Sol
        const sunDist = Math.hypot(mx - cx, my - cy);
        if (sunDist < DATA.sun.radius * zoom + 10) {
            return { body: DATA.sun, type: 'sun' };
        }
        
        // Verificar planetas
        for (const planet of DATA.planets) {
            const angle = time * planet.speed * 0.001;
            const px = cx + Math.cos(angle) * planet.orbitRadius * zoom;
            const py = cy + Math.sin(angle) * planet.orbitRadius * zoom;
            const dist = Math.hypot(mx - px, my - py);
            if (dist < planet.radius * zoom + 8) {
                return { body: planet, type: 'planet' };
            }
        }
        
        // Verificar planetas enanos
        for (const dp of DATA.dwarfPlanets) {
            const angle = time * dp.speed * 0.001;
            const px = cx + Math.cos(angle) * dp.orbitRadius * zoom;
            const py = cy + Math.sin(angle) * dp.orbitRadius * zoom;
            const dist = Math.hypot(mx - px, my - py);
            if (dist < dp.radius * zoom + 8) {
                return { body: dp, type: 'dwarf' };
            }
        }
        
        // Verificar lunas
        for (const moon of DATA.moons) {
            const parent = DATA.planets.find(p => p.name === moon.parent);
            if (!parent) continue;
            
            const parentAngle = time * parent.speed * 0.001;
            const parentX = cx + Math.cos(parentAngle) * parent.orbitRadius * zoom;
            const parentY = cy + Math.sin(parentAngle) * parent.orbitRadius * zoom;
            
            const moonAngle = time * moon.speed * 0.001;
            const mx2 = parentX + Math.cos(moonAngle) * moon.orbitRadius * zoom;
            const my2 = parentY + Math.sin(moonAngle) * moon.orbitRadius * zoom;
            
            const dist = Math.hypot(mx - mx2, my - my2);
            if (dist < moon.radius * zoom + 6) {
                return { body: moon, type: 'moon' };
            }
        }
        
        return null;
    }
    
    function showTooltip(mx, my) {
        const tooltip = document.getElementById('tooltip');
        if (hoveredBody && !selectedBody) {
            tooltip.textContent = `${hoveredBody.body.emoji} ${hoveredBody.body.name} - Click para ver detalles`;
            tooltip.style.left = (mx + 15) + 'px';
            tooltip.style.top = (my - 10) + 'px';
            tooltip.classList.add('visible');
        } else {
            tooltip.classList.remove('visible');
        }
    }
    
    function selectBody(body, type) {
        selectedBody = { body, type };
        showInfoPanel(body, type);
        
        // Actualizar lista
        document.querySelectorAll('.planet-item').forEach(el => {
            el.classList.toggle('active', el.dataset.name === body.name);
        });
    }
    
    function closePanel() {
        selectedBody = null;
        document.getElementById('info-panel').classList.add('hidden');
        document.querySelectorAll('.planet-item').forEach(el => el.classList.remove('active'));
    }
    
    function showInfoPanel(body, type) {
        const panel = document.getElementById('info-panel');
        document.getElementById('panel-icon').textContent = body.emoji || '🪐';
        document.getElementById('panel-title').textContent = body.name;
        
        let html = '';
        
        // Información
        for (const [key, value] of Object.entries(body.info)) {
            html += `<div class="info-row"><span class="info-label">${key}</span><span class="info-value">${value}</span></div>`;
        }
        
        // Composición
        if (body.composition) {
            html += '<div class="composition"><h4>🧪 Composición</h4>';
            for (const comp of body.composition) {
                html += `
                    <div class="comp-item">
                        <div class="comp-color" style="background:${comp.color}"></div>
                        <span style="min-width:120px">${comp.name}</span>
                        <div class="comp-bar-bg"><div class="comp-bar" style="width:${comp.percent}%;background:${comp.color}"></div></div>
                        <span class="comp-percent">${comp.percent}%</span>
                    </div>`;
            }
            html += '</div>';
        }
        
        // Estructura interna
        if (body.structure) {
            html += `<div class="internal-structure"><h4>🌋 Estructura interna</h4><p>${body.structure}</p></div>`;
        }
        
        // Tipo
        if (type === 'moon') {
            html += `<div class="info-row"><span class="info-label">Planeta padre</span><span class="info-value">${body.parent}</span></div>`;
        }
        if (type === 'dwarf') {
            html += `<div class="info-row"><span class="info-label">Clasificación</span><span class="info-value">Planeta enano (UAI 2006)</span></div>`;
        }
        
        document.getElementById('panel-body').innerHTML = html;
        panel.classList.remove('hidden');
    }
    
    // ==================== CONTROLES ====================
    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('btn-play').textContent = isPaused ? '▶️ Reanudar' : '⏸️ Pausar';
        document.getElementById('btn-play').classList.toggle('active', isPaused);
    }
    
    function changeSpeed(delta) {
        speed = Math.max(0.1, Math.min(5, speed + delta));
        document.getElementById('speed-display').textContent = speed.toFixed(1) + 'x';
    }
    
    function resetView() {
        camX = 0; camY = 0; zoom = 1;
        closePanel();
    }
    
    function toggleOrbits() {
        showOrbits = !showOrbits;
        document.getElementById('btn-orbits').classList.toggle('active', showOrbits);
    }
    
    function toggleLabels() {
        showLabels = !showLabels;
        document.getElementById('btn-labels').classList.toggle('active', showLabels);
    }
    
    function toggleAsteroids() {
        showAsteroids = !showAsteroids;
        document.getElementById('btn-asteroids').classList.toggle('active', showAsteroids);
    }
    
    function togglePerspective() {
        use3D = !use3D;
        document.getElementById('btn-perspective').classList.toggle('active', use3D);
        document.getElementById('view-indicator').textContent = use3D ? '🌐 Vista 3D Perspectiva' : '🚁 Vista Cenital - Helicóptero Interestelar';
    }
    
    // ==================== RENDERIZADO ====================
    function drawStars() {
        // Fondo estrellado estático
        const seed = 12345;
        let rng = seed;
        function rand() { rng = (rng * 16807) % 2147483647; return (rng - 1) / 2147483646; }
        
        for (let i = 0; i < 300; i++) {
            const x = rand() * W;
            const y = rand() * H;
            const size = rand() * 1.5 + 0.5;
            const alpha = rand() * 0.5 + 0.3;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fill();
        }
    }
    
    function drawOrbit(cx, cy, radius, color = 'rgba(74,144,226,0.2)') {
        ctx.beginPath();
        ctx.arc(cx, cy, radius * zoom, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    
    function drawSun(cx, cy) {
        const sun = DATA.sun;
        const r = sun.radius * zoom;
        
        // Brillo exterior
        const glow = ctx.createRadialGradient(cx, cy, r, cx, cy, r * 4);
        glow.addColorStop(0, 'rgba(253, 184, 19, 0.3)');
        glow.addColorStop(0.5, 'rgba(255, 165, 0, 0.1)');
        glow.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(cx, cy, r * 4, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
        
        // Sol
        const grad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r);
        grad.addColorStop(0, '#FFF5E1');
        grad.addColorStop(0.5, sun.color);
        grad.addColorStop(1, sun.glowColor);
        
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        
        // Etiqueta
        if (showLabels) {
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${Math.max(10, 12 * zoom)}px Segoe UI`;
            ctx.textAlign = 'center';
            ctx.fillText('☀️ Sol', cx, cy - r - 8);
        }
    }
    
    function drawPlanet(planet, cx, cy) {
        const angle = time * planet.speed * 0.001;
        const x = cx + Math.cos(angle) * planet.orbitRadius * zoom;
        const y = cy + Math.sin(angle) * planet.orbitRadius * zoom;
        const r = planet.radius * zoom;
        
        // Órbita
        if (showOrbits) {
            drawOrbit(cx, cy, planet.orbitRadius);
        }
        
        // Selección/hover
        const isSelected = selectedBody?.body.name === planet.name;
        const isHovered = hoveredBody?.body.name === planet.name;
        
        if (isSelected || isHovered) {
            ctx.beginPath();
            ctx.arc(x, y, r + 10, 0, Math.PI * 2);
            ctx.strokeStyle = isSelected ? '#4a90e2' : '#6ab0f3';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // Planeta
        const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
        grad.addColorStop(0, lighten(planet.color, 40));
        grad.addColorStop(0.7, planet.color);
        grad.addColorStop(1, darken(planet.color, 40));
        
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // Anillos de Saturno
        if (planet.hasRings) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(1, 0.3);
            ctx.beginPath();
            ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(200, 180, 150, 0.6)';
            ctx.lineWidth = 3 * zoom;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, r * 1.8, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(220, 200, 170, 0.4)';
            ctx.lineWidth = 2 * zoom;
            ctx.stroke();
            ctx.restore();
        }
        
        // Etiqueta
        if (showLabels || isSelected || isHovered) {
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.max(9, 11 * zoom)}px Segoe UI`;
            ctx.textAlign = 'center';
            ctx.fillText(`${planet.emoji} ${planet.name}`, x, y - r - 6);
        }
        
        return { x, y };
    }
    
    function drawDwarfPlanet(dp, cx, cy) {
        const angle = time * dp.speed * 0.001;
        const inclRad = (dp.inclination || 0) * Math.PI / 180;
        const x = cx + Math.cos(angle) * dp.orbitRadius * zoom;
        const y = cy + Math.sin(angle) * dp.orbitRadius * zoom * Math.cos(inclRad);
        const r = dp.radius * zoom;
        
        if (showOrbits) {
            ctx.beginPath();
            ctx.ellipse(cx, cy, dp.orbitRadius * zoom, dp.orbitRadius * zoom * Math.cos(inclRad), 0, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(74,144,226,0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
        
        const isSelected = selectedBody?.body.name === dp.name;
        const isHovered = hoveredBody?.body.name === dp.name;
        
        if (isSelected || isHovered) {
            ctx.beginPath();
            ctx.arc(x, y, r + 8, 0, Math.PI * 2);
            ctx.strokeStyle = '#4a90e2';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
        grad.addColorStop(0, lighten(dp.color, 30));
        grad.addColorStop(1, dp.color);
        
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        
        if (showLabels || isSelected || isHovered) {
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.max(9, 10 * zoom)}px Segoe UI`;
            ctx.textAlign = 'center';
            ctx.fillText(`${dp.emoji} ${dp.name}`, x, y - r - 6);
        }
    }
    
    function drawMoon(moon, parentX, parentY) {
        const angle = time * moon.speed * 0.001;
        const x = parentX + Math.cos(angle) * moon.orbitRadius * zoom;
        const y = parentY + Math.sin(angle) * moon.orbitRadius * zoom;
        const r = Math.max(2, moon.radius * zoom);
        
        // Órbita lunar
        if (showOrbits && zoom > 0.5) {
            ctx.beginPath();
            ctx.arc(parentX, parentY, moon.orbitRadius * zoom, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(100,150,255,0.1)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }
        
        const isSelected = selectedBody?.body.name === moon.name;
        const isHovered = hoveredBody?.body.name === moon.name;
        
        if (isSelected || isHovered) {
            ctx.beginPath();
            ctx.arc(x, y, r + 6, 0, Math.PI * 2);
            ctx.strokeStyle = '#4a90e2';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = moon.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        
        if (showLabels && zoom > 0.8 || isSelected || isHovered) {
            ctx.fillStyle = '#ccc';
            ctx.font = `${Math.max(8, 9 * zoom)}px Segoe UI`;
            ctx.textAlign = 'center';
            ctx.fillText(moon.name, x, y - r - 4);
        }
    }
    
    function drawAsteroidBelt(cx, cy) {
        for (const ast of asteroids) {
            const angle = ast.angle + time * ast.speed * 0.0001;
            const x = cx + Math.cos(angle) * ast.radius * zoom;
            const y = cy + Math.sin(angle) * ast.radius * zoom;
            const size = ast.size * zoom;
            
            if (size > 0.3) {
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(150, 140, 130, ${ast.brightness})`;
                ctx.fill();
            }
        }
    }
    
    // ==================== UTILIDADES ====================
    function lighten(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.min(255, (num >> 16) + amount);
        const g = Math.min(255, ((num >> 8) & 0x00FF) + amount);
        const b = Math.min(255, (num & 0x0000FF) + amount);
        return `rgb(${r},${g},${b})`;
    }
    
    function darken(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.max(0, (num >> 16) - amount);
        const g = Math.max(0, ((num >> 8) & 0x00FF) - amount);
        const b = Math.max(0, (num & 0x0000FF) - amount);
        return `rgb(${r},${g},${b})`;
    }
    
    // ==================== BUCLE PRINCIPAL ====================
    function animate() {
        ctx.clearRect(0, 0, W, H);
        
        // Fondo
        const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) / 2);
        bg.addColorStop(0, '#0a0a2a');
        bg.addColorStop(1, '#000008');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        
        drawStars();
        
        const cx = W / 2 + camX * zoom;
        const cy = H / 2 + camY * zoom;
        
        // Cinturón de asteroides
        if (showAsteroids) {
            drawAsteroidBelt(cx, cy);
        }
        
        // Sol (siempre detrás)
        drawSun(cx, cy);
        
        // Planetas enanos (detrás de planetas)
        for (const dp of DATA.dwarfPlanets) {
            drawDwarfPlanet(dp, cx, cy);
        }
        
        // Planetas
        const planetPositions = [];
        for (const planet of DATA.planets) {
            const pos = drawPlanet(planet, cx, cy);
            planetPositions.push({ planet, ...pos });
        }
        
        // Lunas (encima de sus planetas)
        for (const moon of DATA.moons) {
            const parentPos = planetPositions.find(p => p.planet.name === moon.parent);
            if (parentPos) {
                drawMoon(moon, parentPos.x, parentPos.y);
            }
        }
        
        // Actualizar tiempo
        if (!isPaused) {
            time += speed;
        }
        
        requestAnimationFrame(animate);
    }
    
    // ==================== INICIAR ====================
    window.addEventListener('load', init);
    </script>
</body>
